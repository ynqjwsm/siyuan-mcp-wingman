name: Release & Docker Build

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # 步骤2：安装 uv（适配Python项目，用于本地打包验证，可选但建议保留）
      - name: Install uv
        uses: astral-sh/setup-uv@v2  # 官方uv安装Action，比手动安装更稳定
        with:
          version: latest  # 安装最新版uv
      # 步骤3：打包源码为 ZIP（逻辑不变，仅保留）
      - name: Package source code as ZIP
        run: |
          TAG_NAME=${{ github.ref_name }}
          zip -r "${{ github.event.repository.name }}-${TAG_NAME}.zip" . -x ".git/*" ".github/*" ".uv/*"
        shell: bash

      - name: Upload ZIP to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.event.repository.name }}-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # 步骤4：Docker 构建（核心调整：适配uv）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/${{ github.event.repository.name }}:${{ github.ref_name }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/${{ github.event.repository.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Sync README to DockerHub
        uses: christian-korneck/update-container-description-action@v1
        env:
          DOCKER_USER: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKER_HUB_TOKEN }}
        with:
          destination_container_repo: ${{ secrets.DOCKER_HUB_USERNAME }}/${{ github.event.repository.name }}
          provider: dockerhub
          readme_file: ./README.md  # 指定 README 文件路径（仓库根目录）